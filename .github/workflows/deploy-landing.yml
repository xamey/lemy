name: Deploy landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build --workspace @lemy/landing
        env:
          BASE_PATH: /
          VITE_LEMY_CLOUD_URL: ${{ vars.LEMY_CLOUD_URL }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

      - id: deployment
        uses: actions/deploy-pages@v4
