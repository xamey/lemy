name: lemy

services:
  codemode:
    build:
      context: .
      dockerfile: services/codemode/Dockerfile
    environment:
      ALLOW_MUTATIONS: ${ALLOW_MUTATIONS:-false}
      API_NAME: ${API_NAME:-openapi-api}
      OPENAPI_BASE_URL: ${OPENAPI_BASE_URL:-}
      OPENAPI_SCHEMA_URL: ${OPENAPI_SCHEMA_URL:?Set OPENAPI_SCHEMA_URL in .env}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${MCP_PORT:-8787}:8787"

  agent:
    build:
      context: .
      dockerfile: services/agent/Dockerfile
    depends_on:
      codemode:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      MCP_URL: ${MCP_URL:-http://codemode:8787/mcp}
      LLM_API_KEY: ${LLM_API_KEY:?Set LLM_API_KEY in .env}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-5-mini}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      POSTGRES_DB: ${POSTGRES_DB:-harness}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      SYSTEM_PROMPT: ${SYSTEM_PROMPT:-}
    healthcheck:
      test: ["CMD", "uv", "run", "--no-sync", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 30

  runtime:
    build:
      context: .
      dockerfile: services/runtime/Dockerfile
    depends_on:
      agent:
        condition: service_healthy
    environment:
      AGENT_URL: ${AGENT_URL:-http://agent:8000/agent}
      BEARER_VALIDATION_URL: ${BEARER_VALIDATION_URL:?Set BEARER_VALIDATION_URL in .env}
      COPILOTKIT_TELEMETRY_DISABLED: ${COPILOTKIT_TELEMETRY_DISABLED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      PORT: 4000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${RUNTIME_PORT:-4000}:4000"
